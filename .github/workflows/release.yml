name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Tests before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --cov=src/random_game --cov-fail-under=80 -q

  build-exe:
    name: Build Windows exe
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build exe
        run: uv run python build.py

      - name: Rename exe with version tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dest = "dist\RandomGame-$tag-win64.exe"
          Move-Item "dist\RandomGame.exe" $dest
          Write-Host "Renamed to: $dest"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: RandomGame-win64
          path: dist\RandomGame-${{ github.ref_name }}-win64.exe
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: RandomGame-win64
          path: release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            echo "Первый релиз — список всех коммитов:"
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            echo "Изменения с $PREV_TAG по $TAG:"
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG..HEAD")
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "## Что нового"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo "### Системные требования"
            echo "- Windows 10/11 (64-bit)"
            echo "- Видеокарта уровня GTX 1060 и выше"
            echo ""
            echo "### Установка"
            echo "Скачайте \`RandomGame-$TAG-win64.exe\` и запустите. Установка не требуется."
            echo "Прогресс хранится в \`%APPDATA%\\random-game\\state.json\`."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Random Game ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/RandomGame-${{ github.ref_name }}-win64.exe
