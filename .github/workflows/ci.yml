name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src/random_game \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  build-exe:
    name: Build exe (Windows)
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build exe
        run: uv run python build.py

      - name: Verify exe exists
        run: |
          if (Test-Path "dist\RandomGame.exe") {
            $size = (Get-Item "dist\RandomGame.exe").length / 1MB
            Write-Host "Build OK: RandomGame.exe ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "Build FAILED: dist\RandomGame.exe not found"
            exit 1
          }
